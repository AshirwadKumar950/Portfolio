<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Page Not Found</title>
  <style>
    body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; flex-direction: column; gap: 16px; }
    h1 { font-size: 5rem; background: linear-gradient(to right, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #9ca3af; }
    a { padding: 10px 28px; border-radius: 999px; background: linear-gradient(to right, #a855f7, #ec4899); color: white; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Oops! This page doesn't exist.</p>
  <a href="/">Go Home</a>
</body>
</html>
